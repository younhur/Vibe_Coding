<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Coding Assignments</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      color: #555;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .assignment-list {
      display: grid;
      gap: 20px;
    }

    .assignment-card {
      display: block;
      padding: 24px;
      background: #ffffff;
      border-radius: 16px;
      text-decoration: none;
      color: #222;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .assignment-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
    }

    .assignment-card h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .assignment-card span {
      color: #777;
      font-size: 15px;
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>Vibe Coding Assignments</h1>

    <p>
      Cursor를 활용한 바이브 코딩 연습 과제 모음입니다.
      아래 과제를 클릭하면 각 작업물 페이지로 이동합니다.
    </p>

    <section class="assignment-list">
      <a href="./assignment_1/" class="assignment-card">
        <h2>Assignment 1</h2>
        <span>HTML, CSS, JavaScript 기반 첫 번째 웹페이지</span>
      </a>
    </section>
  </main>
</body>
</html>
