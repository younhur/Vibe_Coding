<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Advisers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="#" class="logo" aria-label="Home">
        <svg viewBox="0 0 40 40" width="36" height="36" aria-hidden="true">
          <ellipse cx="20" cy="26" rx="14" ry="8" fill="none" stroke="#FF6B6B" stroke-width="2"/>
          <circle cx="20" cy="12" r="4" fill="#FF6B6B"/>
        </svg>
      </a>

      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="nav-menu">
        <li><a href="#">Services</a></li>
        <li><a href="#" class="active">Offices</a></li>
        <li><a href="#">Team</a></li>
        <li><a href="#">Philosophy</a></li>
        <li><a href="#">Spaces</a></li>
      </ul>

      <a href="#" class="btn-login">Login</a>
    </nav>
  </header>

  <main class="main">
    <section class="hero-left">
      <div class="portrait-wrap">
        <div class="shape shape-circle-large"></div>
        <div class="shape shape-semi-left"></div>
        <div class="shape shape-dots"></div>
        <div class="shape shape-circle-small"></div>
        <div class="shape shape-ring"></div>
        <img
          src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=800&q=80"
          alt="Lorraine Wolf, Technology lawyer"
          class="portrait"
        >
      </div>

      <div class="team-info">
        <div class="team-label">
          <span>Our team</span>
          <span class="team-line"></span>
        </div>
        <p class="team-name">Lorraine Wolf</p>
        <h1 class="team-role">Technology lawyer</h1>
        <a href="#" class="explore-link">Explore</a>
      </div>
    </section>

    <section class="hero-right">
      <div class="hero-content">
        <h2 class="hero-title">
          Your legal advisers for the problems of this century
        </h2>
        <p class="hero-subtitle">
          We offer solutions adapted to today's needs
        </p>
        <a href="#" class="btn-view-more">View more</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
